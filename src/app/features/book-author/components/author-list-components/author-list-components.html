<ul class="list bg-base-100 rounded-box shadow-md">
  @for( item of authorList(); track item.id_author) {
    <li class="list-row">
      <div class="my-auto py-auto">
        <img src='/images/icon-check.svg'/>
      </div>

      <div class="my-auto">
        <div class="text-shadow-xs uppercase font-semibold opacity-60">{{ item.name }}</div>
      </div>
  
      <button
        (click)="delete(item, $event)"
        class="btn bg-my-pink text-my-light">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="#fff" d="M7 21q-.825 0-1.412-.587T5 19V6H4V4h5V3h6v1h5v2h-1v13q0 .825-.587 1.413T17 21zm2-4h2V8H9zm4 0h2V8h-2z"/></svg>
      </button>
    </li>
  }  
</ul>
