<app-section-header-component 
  [title]="'Autores'"
  [actionText]="'Volver Atras'"
  (actionClicked)="navigateBack()"
/>

<section class="p-4 grid grid-cols-1 gap-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <app-author-form-components 
      [isLoading]="isLoading()"
      [author]="selectedAuthor()"
      (onClear)="onClear()"
      (onFormSubmit)="onFormSubmit($event)"      
    />
  </div>  
  
  @if (successMessage()) {
    <app-message-success-component [message]="successMessage()" />  }
   
  @if (errorMessage()) {
    <app-message-error-component [message]="errorMessage()" />
  }
  
  <app-author-list-components 
    [isLoading]="isLoading()"
    [paginationAuthorList]="computedPaginationAuthorList()"
    (onReload)="onReload()"
    (onNextPage)="onNextPage()"
    (onPrevPage)="onPrevPage()"
    (onEdit)="onSelectedAuthor($event)"
    (onDelete)="onDeleteAuthor($event)"
  />
</section>


<app-modal-action-component 
  [isOpen]="isModalOpen()"
  [isLoading]="isLoading()"
  [textTitle]="'Eliminar Autor'"
  [textContent]="'¿Estas Seguro que deceas eliminar el Autor?'"
  [textName]="selectedAuthorToDelete()?.name ?? 'Sin Nombre'"
  (onModalClose)="onCloseModal()"
  (onConfirm)="onConfirmModal()"
/>

<app-modal-delete-component
  [isOpen]="false"
  [isLoading]="false"
/>
