<app-section-header-component 
  [title]="'Géneros'"
  [actionText]="'Volver Atras'"
  (actionClicked)="navigateBack()"
/>

<section class="p-4 grid grid-cols-1 gap-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <app-genre-form-components 
      [isLoading]="isLoading()"
      [subject]="selectedGenre()"
      (onClear)="onClear()"
      (onFormSubmit)="onFormSubmit($event)" 
    />
  </div>  
  
  @if (successMessage()) {
    <app-message-success-component [message]="successMessage()" />  }
   
  @if (errorMessage()) {
    <app-message-error-component [message]="errorMessage()" />
  }

  <app-genre-list-components 
    [isLoading]="isLoading()"
    [paginationGenreList]="computedPaginationGenreList()"
    (onReload)="onReload()"
    (onNextPage)="onNextPage()"
    (onPrevPage)="onPrevPage()"
    (onEdit)="onSelectedGenre($event)"
    (onDelete)="onDeleteGenre($event)"
    (onSearch)="onSearchFilter($event)"
  />
</section>

<app-modal-action-component 
  [isOpen]="isModalOpen()"
  [isLoading]="isLoading()"
  [textTitle]="'Eliminar Género'"
  [textContent]="'¿Estás seguro que deseas eliminar el Género?'"
  [textName]="selectedGenreToDelete()?.name ?? 'Sin Nombre'"
  (onModalClose)="onCloseModal()"
  (onConfirm)="onConfirmModal()"
/>
