<ul class="list bg-base-100 rounded-box shadow-md m-4">
  <li class="p-4 pb-2 text-xs opacity-60 tracking-wide">Lista de Libros</li>

  @if (isLoading()) {
    <section class="mx-auto p-4">
      <app-loading-component/>
    </section>
  } @else {
  
    @for (book of bookList(); track book.id_book) {
      <app-book-list-row-component 
        [bookDetail]="book"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
      />
    }
  }  
</ul>
