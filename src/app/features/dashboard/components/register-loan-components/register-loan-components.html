<section class="bg-my-light border-base-300 rounded-box border p-6 shadow-xl">
  <!-- Título -->
  <div class="py-4">
    <h3 class="card-title text-xl text-my-purple">Registrar Préstamo</h3>
    <p class="text-sm text-base-content/60">Convertir reserva a préstamo</p>
  </div>

  <!-- Formulario -->
  <form class="space-y-4">
    <!-- Campo de búsqueda -->
    <fieldset class="fieldset">
      <label class="label">Código de Barra</label>

      <div class="flex">
        <!-- Input + icono -->
        <div class="input flex items-center gap-2 flex-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="#000" d="M1 19V5h2v14zm3 0V5h2v14zm3 0V5h1v14zm3 0V5h2v14zm3 0V5h3v14zm4 0V5h1v14zm3 0V5h3v14z"/>
          </svg>
          <input type="search" class="flex-1" required placeholder="Código de Barra" />
        </div>

        <!-- Botón Buscar (solo botón, no submit) -->
        <button type="button" class="btn bg-my-purple hover:bg-my-purple/80 text-my-light rounded-l-none ml-2">
          Buscar
        </button>
      </div>
    </fieldset>

    <!-- Botón de registrar préstamo -->
    <button type="submit" class="btn bg-my-purple hover:bg-my-purple/80 text-my-light w-full">
      Registrar Préstamo
    </button>
  </form>

  <!-- Divider -->
  <div class="divider p-4 text-base-content/40 max-w-7xl mx-auto">RESULTADOS DE BÚSQUEDA</div>

  <!-- Icono de resultados -->
  <figure class="flex justify-center fill-my-purple">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
      <path d="M9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l5.6 5.6q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-5.6-5.6q-.75.6-1.725.95T9.5 16m0-2q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/>
    </svg>
  </figure>
</section>
