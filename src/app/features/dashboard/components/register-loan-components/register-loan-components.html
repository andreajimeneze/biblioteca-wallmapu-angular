<section class="bg-my-light border-base-300 rounded-box border p-6 shadow-xl">
  <!-- Título -->
  <div class="py-4">
    <h3 class="card-title text-xl text-my-purple">Registrar Préstamo</h3>
    <p class="text-sm text-base-content/60">Convertir reserva a préstamo</p>
  </div>

  <div class="divider text-base-content/40 max-w-7xl mx-auto my-2">Buscar Reserva</div>

  <app-search-codbar-component 
    [clearTrigger]="clearCounter()"
    [textTitle]="'Código de Barra de la Reserva'"
    [errorMessage]="reservationErrorMessage()"
    [isLoading]="isLoadingReservation()"
    (onSubmit)="onSubmitReservation($event)"
  />

  <app-register-loan-detail-components 
    [reservationModel]="computedReservation()"
  />

  @if (computedReservation()) {
    <div class="divider text-base-content/40 max-w-7xl mx-auto my-2">Confirmar Libro</div>

    <app-search-codbar-component 
      [clearTrigger]="clearCounter()"
      [textTitle]="'Código de Barra del Libro'"
      [errorMessage]="bookErrorMessage()"
      [isLoading]="isLoading()"
      (onSubmit)="getBookBarCode($event)"
    />
  }

  @if (errorMessage()) {
    <app-message-error-component
      [message]="errorMessage()"
    />
  }

  @if (enableButton()) {
    <button (click)="onClick()" type="button" class="btn bg-my-purple hover:bg-my-purple/80 text-my-light w-full mt-2">
      Registrar Préstamo
    </button>  
  }

  <button (click)="onClear()" type="button" class="btn bg-my-green hover:bg-my-green/80 text-my-light w-full mt-2">
    Limpiar
  </button>
</section>
