<app-section-header-component [title]="'Panel de Administración'" />

<div class= "p-4 grid gap-4">
  <section class="mx-auto">
    <app-admin-stats-components/>
  </section>

  <section class="grid grid-cols-1 md:grid-cols-2 gap-4">  
    <app-loan-overdue-list-component
      [isLoading]="isLoading()"
      [loanOverdueList]="computedLoanOverdueList()"
    />
    <app-loan-policy-component/>
  </section>  

  <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"> 
    <app-copy-status-component />
    <app-loan-status-component />
    <app-reservation-status-component />
  </section>
</div>
