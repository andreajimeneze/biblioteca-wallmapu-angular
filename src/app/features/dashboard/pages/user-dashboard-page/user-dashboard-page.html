<section class="p-4 grid grid-cols-1 gap-4">
  <app-user-stats-components/>

  @if(errorMessage()) {
    <app-message-error-component [message]="errorMessage()"/>
  }

  <app-notification-list-components 
    [isLoading]="isLoading()"
    [isUser]="true"
    [paginationAndNotificationList]="computedPaginationAndNotificationList()"
    (onReload)="onReloadNotification()"
    (onMarkAsRead)="onMarkAsRead($event)"
    (onMarkAllAsRead)="onMarkAllAsRead()"
    (onNextPage)="nextPage()"
    (onPrevPage)="prevPage()"
    (onFilterNotRead)="onFilterNotRead($event)"
  />  
</section>
