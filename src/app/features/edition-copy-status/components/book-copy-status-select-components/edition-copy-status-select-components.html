@if (isLoading() ) {
  <app-loading-component/>
} @else {
  <select 
    [disabled]="disabled()"
    [value]="selectedId()"
    (change)="onChange($event)"
    class="select text-my-pink"
  >      
    <option disabled>Seleccióne una Región</option>
    @for (item of editionCopyStatusComputedList(); track item.id_status) {
      <option 
        [value]="item.id_status"
        [selected]="item.id_status === selectedId()">
        
        {{ item.name }}
      </option>
    }
  </select>
}
