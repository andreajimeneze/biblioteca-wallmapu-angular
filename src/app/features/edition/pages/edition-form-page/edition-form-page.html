<app-section-header-component
  [title]="title()"
  [actionText]="'Volver a Libro'"
  (actionClicked)="navigateBack()"
/>

<app-edition-form-components 
  [isLoading]="isLoading()"
  [editionFormVM]="editionFormVMComputed()"
  (onDeleteImage)="deleteImage($event)"
  (onFormSubmit)="formSubmit($event)"
/>

@if (errorMessage()) {
  <div class="px-4">
    <app-message-error-component
      [message]="errorMessage()"
    /> 
  </div>
}

@if (isEditMode()) {
  <div class="m-4 flex justify-end">
    <button (click)="onCeateCopy()" class="btn max-w-48 bg-my-pink text-my-light">
      Crear Copia
    </button>
  </div>  
}

<app-edition-copy-list-components 
  [isLoading]="isLoading()"
  [editionCopyModel]="editionFormVMComputed().copies"
  (onEdit)="onEditEdition($event)"
  (onDelete)="onDeleteEditionCopy($event)"
/>

<app-modal-delete-component
  title="Eliminar Copia"
  [isOpen]="openDeleteModal()"
  [loading]="isLoading()"
  [itemName]="selectedEditionCopyDetailToDelete()?.signature_topography"
  (confirm)="confirmDelete()"
  (cancel)="closeDeleteModal()"
/>
