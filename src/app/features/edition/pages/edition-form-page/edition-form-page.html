<app-section-header-component
  [title]="title()"
  [actionText]="'Volver a Libro'"
  (actionClicked)="navigateBack()"
/>

<app-edition-form-components 
  [isLoading]="isLoading()"
  [editionFormVM]="editionFormVMComputed()"
  (onDeleteImage)="deleteImage($event)"
  (onFormSubmit)="formSubmit($event)"
  (onNavigateToEditorial)="navigateToEditorial()"
  (onNavigateToFormat)="navigateToFormat()"
/>

<div class="px-4 grid gap-4">
  @if(successMessage()) {
    <app-message-success-component [message]="successMessage()" />
  }

  @if (errorMessage()) {
    <app-message-error-component [message]="errorMessage()"/> 
  }
</div>

@if (isEditMode()) {
  <div class="m-4 flex justify-end">
    <app-button-create-component
      [textBtn]="'Crear Copia'"
      (onClick)="onCreateCopy()"
    />
  </div>  
}

<app-copy-list-for-edition-components
  [isLoading]="isLoading()"
  [copyList]="computedCopyList()"
  (onEdit)="onEditEdition($event)"
  (onDelete)="onDeleteCopy($event)"
/>

<app-modal-action-component
  [isLoading]="isLoading()"
  [isOpen]="openDeleteModal()"
  [textTitle]="'Eliminar Copia'"
  [textContent]="'¿Estás seguro que deseas eliminar la Copia?'"
  [textName]="selectedCopyToDelete()?.signature_topography + ' - Copia N°: ' + selectedCopyToDelete()?.copy_number"
  (onConfirm)="confirmDelete()"
  (onModalClose)="closeDeleteModal()"
/>
