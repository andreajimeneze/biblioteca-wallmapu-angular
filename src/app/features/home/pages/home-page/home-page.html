<app-header-component 
  [title]="'Bienvenidas y bienvenidos'" 
  [description]="'A la Biblioteca Wallmapu de Mesana. Te invitamos a ser parte de nuestra biblioteca.'"
  [image]="'/images/header_home.webp'" 
/>

<app-section-header-component
  [title]="'Últimas Noticias'"
  [description]="'Mantente al día con las actividades, novedades y el quehacer de nuestra biblioteca'"
  [actionText]="'Leer Mas'"
  (actionClicked)="actionClicked()"
/>

<app-news-featured-component 
  [newsWithImages]="firstNewsWithImages()"
/>

<app-news-card-list-component 
  [newsWithImagesList]="restNewsWithImages()"
/>

<div class="max-w-7xl mx-auto">
  <app-edition-search-component
    [textTitle]="'La lectura nos abre las puertas del mundo'"
    [textDescription]="'Revisa nuestro catálogo de libros y elige el que quieras leer.'"
    [searchPlaceholder]="'Buscar por Título o ISBN...'"
    (onSearchChange)="searchText($event)"
    (onAuthorIdSelected)="onAuthorIdSelected($event)"
    (onFormatIdSelected)="onFormatIdSelected($event)"
    (onEditorialIdSelected)="onEditorialIdSelected($event)"
    (onGenreIdSelected)="onGenreIdSelected($event)"
    (onSubjectIdSelected)="onSubjectIdSelected($event)"
  />
</div>

<app-edition-card-list-component
  [isLoading]="isLoading()"
  [editionDetailList]="editionListComputed()"
  (navigateTo)="onNavigateTo($event)"
/>

<app-pagination-component 
  [currentPage]="currentPage()" 
  [totalPages]="totalPages()"
  (prevPage)="prevPage()"
  (nextPage)="nextPage()" 
/>

<div id="about">
  <app-about-component />
</div>
