@if(isLoading()) {
  <app-loading-component/>
} @else {
  <select 
    [disabled]="disabled()"
    [value]="selectedId()"
    (change)="onChange($event)"
    class="select text-my-pink"
  >      
    <option disabled>Seleccióne un Estado</option>
    @for (item of computedLoanStatusList(); track item.id_status) {
      <option 
        [value]="item.id_status"
        [selected]="item.id_status === selectedId()">
        
        {{ item.status }}
      </option>
    }
  </select>
}
