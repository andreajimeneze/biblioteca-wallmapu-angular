@if (isOpen()) {
  <div class="modal modal-open" role="dialog">
    <div class="modal-box bg-my-light">
      
      <h3 class="text-lg font-bold text-my-pink">
        {{ title() }}
      </h3>

      <p class="py-4 text-my-purple text-lg">
        {{ contentText() }}
        <br/>
        <strong>{{ itemName() }}</strong>?
      </p>
      
      <div class="modal-action">
        @if (loading()) {
          <app-loading-component/>
        } @else {
          <button class="btn bg-my-pink text-my-light"(click)="confirm.emit()">{{ title() }}</button>
          <button class="btn" (click)="cancel.emit()">Cerrar</button> 
        }
      </div>

    </div>
  </div>
}
