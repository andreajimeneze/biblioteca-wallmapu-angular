<section class="grid grid-cols-1 items-center">
  @if (textTitle()) {
    <label class="label mb-1">
      <span class="label-text text-sm font-semibold">{{ textTitle() }}</span>
    </label>  
  }

  <label class="input focus-within:border-my-green focus-within:outline-none">
    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </g>
    </svg>
    <input type="search"
      [placeholder]="textPlaceholder()"
      [value]="inputText()"
      (input)="inputTextChange($event)"
    />
  </label>
</section>
